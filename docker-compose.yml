services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_PASSWORD: app
      POSTGRES_USER: app
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 20

  tasks-api:
    build:
      context: .
      dockerfile: services/tasks/Dockerfile
      target: api
    environment:
      APP_ENV: local
      AUTH_HMAC_SECRET: ${AUTH_HMAC_SECRET:-local-dev-secret-change-me}
      DATABASE_URL: postgres://app:app@postgres:5432/app?sslmode=disable
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      TASK_API_PORT: 8080
      ALLOWED_ORIGINS: http://localhost:${WEB_PORT:-3000},http://127.0.0.1:${WEB_PORT:-3000}
    ports:
      - "${TASK_API_HOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  tasks-worker:
    build:
      context: .
      dockerfile: services/tasks/Dockerfile
      target: worker
    environment:
      APP_ENV: local
      DATABASE_URL: postgres://app:app@postgres:5432/app?sslmode=disable
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - tasks-api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ROOT_USER: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  mailpit:
    image: axllent/mailpit:v1.24
    ports:
      - "1025:1025"
      - "8025:8025"

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    volumes:
      - ./configs/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana-oss:latest}
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./configs/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:latest}
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./configs/observability/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki

  tempo:
    image: ${TEMPO_IMAGE:-grafana/tempo:latest}
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo/config.yaml"]
    ports:
      - "3200:3200"
      - "4317"
      - "4318"
    volumes:
      - ./configs/observability/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:latest}
    profiles: ["observability"]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
    volumes:
      - ./configs/observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - loki
      - tempo

volumes:
  grafana-data:
  loki-data:
  minio-data:
  postgres-data:
  prometheus-data:
  tempo-data:
