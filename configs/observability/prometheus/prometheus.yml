global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888", "otel-collector:8889"]

  - job_name: tasks-api
    metrics_path: /metrics
    static_configs:
      - targets: ["tasks-api:8080"]
        labels:
          service: tasks-api
